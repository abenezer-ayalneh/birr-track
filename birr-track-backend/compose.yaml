services:
    postgres:
        image: postgres:16-alpine
        container_name: birr-track-postgres
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: birr_track
        ports:
            - '5432:5432'
        volumes:
            - birrtrack_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d birr_track']
            interval: 5s
            timeout: 3s
            retries: 20

    redis:
        image: redis:7-alpine
        container_name: birr-track-redis
        ports:
            - '6379:6379'
        volumes:
            - birrtrack_redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 20

    minio:
        image: minio/minio:latest
        container_name: birr-track-minio
        command: server /data --console-address ':9001'
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        ports:
            - '9000:9000'
            - '9001:9001'
        volumes:
            - birrtrack_minio_data:/data
        healthcheck:
            test: ['CMD', 'mc', 'ready', 'local']
            interval: 5s
            timeout: 3s
            retries: 20

volumes:
    birrtrack_postgres_data:
    birrtrack_redis_data:
    birrtrack_minio_data:
