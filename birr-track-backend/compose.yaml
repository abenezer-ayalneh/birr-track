services:
    postgres:
        image: postgres:16-alpine
        container_name: birr-track-postgres
        env_file: ../.env
        environment:
            POSTGRES_USER: ${DATABASE_USER:-postgres}
            POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
            POSTGRES_DB: ${DATABASE_NAME:-birr_track}
        ports:
            - '${DATABASE_PORT:-5432}:5432'
        volumes:
            - birrtrack_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-postgres}']
            interval: 5s
            timeout: 3s
            retries: 20

    redis:
        image: redis:7-alpine
        container_name: birr-track-redis
        env_file: ../.env
        ports:
            - '${REDIS_PORT:-6379}:6379'
        volumes:
            - birrtrack_redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 20

    minio:
        image: minio/minio:latest
        container_name: birr-track-minio
        env_file: ../.env
        command: server /data --console-address ':${MINIO_CONSOLE_PORT:-9001}'
        environment:
            MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
            MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
        ports:
            - '${MINIO_API_PORT:-9000}:9000'
            - '${MINIO_CONSOLE_PORT:-9001}:${MINIO_CONSOLE_PORT:-9001}'
        volumes:
            - birrtrack_minio_data:/data
        healthcheck:
            test: ['CMD', 'mc', 'ready', 'local']
            interval: 5s
            timeout: 3s
            retries: 20

volumes:
    birrtrack_postgres_data:
    birrtrack_redis_data:
    birrtrack_minio_data:
