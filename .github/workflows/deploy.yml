name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-vlm:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[vlm]')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./vlm-inference
          push: true
          tags: abenezerayalneh/birr-track-vlm:latest
          platforms: linux/amd64

  deploy-vps:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/birr-track
            git pull origin main
            set -a && source .env && set +a
            docker compose -f docker-compose.prod.yml up -d --build backend miniapp
            docker compose -f docker-compose.prod.yml exec -T backend node ./node_modules/typeorm/cli -d dist/src/database/data-source.js migration:run
