services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ./.env
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-birr_track}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file: ./.env
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    env_file: ./.env
    command: server /data --console-address ":9003"
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9002}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9003}:9003"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./birr-track-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./.env
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3004}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  miniapp:
    build:
      context: ./birr-track-miniapp
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./.env
    ports:
      - "127.0.0.1:${MINI_APP_PORT:-3003}:80"

volumes:
  pgdata:
  redisdata:
  miniodata:
